; RP2040/Pico + RC522 RFID USB serial firmware
; Recommended: PlatformIO with Earle Philhower Arduino-Pico core.
;
; If your PlatformIO install already supports rpipico, this should work as-is.
; If not, install/update PlatformIO, then run: pio run -t upload

[env:rpipico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
lib_deps =
  miguelbalboa/MFRC522@^1.4.11
build_flags =
  -D USB_SERIAL=1
